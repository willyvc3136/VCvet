<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VCvet - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between">
            <a href="/" class="text-2xl font-bold">🐾 VCvet</a>
            <div class="space-x-4">
                <a href="/" class="hover:underline">Inicio</a>
                <a href="/registro" class="hover:underline">Registro</a>
                <a href="/pacientes" class="hover:text-blue-200 transition">Pacientes</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-5">
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="mb-4 p-4 bg-green-100 text-green-700 border border-green-400 rounded shadow-sm">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

    </main>
</body>
</html>
