{% extends "base.html" %}

{% block title %}Registro de Paciente{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Registrar Nueva Mascota</h2>
    <form action="/registrar_paciente" method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700">Nombre de la Mascota:</label>
            <input type="text" name="nombre" class="w-full border p-2 rounded" required>
        </div>
        <div>
            <label class="block text-gray-700">Especie:</label>
            <input type="text" name="especie" class="w-full border p-2 rounded" required>
        </div>
        <div>
            <label class="block text-gray-700">Nombre del Dueño:</label>
            <input type="text" name="dueño" class="w-full border p-2 rounded" required>
        </div>
        
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700 transition">
            Guardar Paciente
        </button>
    </form>
</div>
{% endblock %}
